# bench/scenarios/configs/aom_default_numpy.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `AOM-default-nipals-adjoint-numpy`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Default AOMPLSRegressor on the default operator bank — same class as
# `AOM-PLS-compact-numpy` but kept as a separate registry entry because
# master CSV labels them distinctly. Until D-C-012 lands a named-bank
# resolver, both entries fit identically.

canonical_name: AOM-default-nipals-adjoint-numpy
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aompls.estimators.AOMPLSRegressor
        params:
          # AOM_v0 estimator with the canonical "default" bank + nipals-adjoint
          # engine, mirroring the master-CSV `AOM-default-nipals-adjoint-numpy`
          # label (D-C-012 fix 2026-05-05 21:15 CEST).
          operator_bank: default
          engine: nipals_adjoint
          selection: global
          criterion: cv
          n_components: auto
          max_components: 25
          cv: 3
          backend: numpy
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 900
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOM-PLS-compact-numpy
    - AOM-default-nipals-adjoint-numpy
