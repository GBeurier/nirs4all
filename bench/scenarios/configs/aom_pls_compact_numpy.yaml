# bench/scenarios/configs/aom_pls_compact_numpy.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `AOM-PLS-compact-numpy`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Default `selection` value ("validation") corresponds to the global / single-validation
# pattern of AOMPLSRegressor (see nirs4all/operators/models/sklearn/aom_pls.py).
# For ASLS variants see asls_aom_compact_cv5.yaml.

canonical_name: AOM-PLS-compact-numpy
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aompls.estimators.AOMPLSRegressor
        params:
          # AOM_v0's AOMPLSRegressor accepts `operator_bank: 'compact'` via
          # `aompls.banks.bank_by_name`. The "compact" bank is exactly the
          # one master CSV uses (D-C-012 fix 2026-05-05 21:15 CEST: was
          # nirs4all version with default bank, identical to ASLS-AOM).
          operator_bank: compact
          engine: simpls_covariance
          selection: global
          criterion: cv
          n_components: auto
          max_components: 25
          cv: 3
          backend: numpy
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 900
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOM-PLS-compact-numpy
