# bench/scenarios/configs/aompls_compact_with_fck_full57.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry
# `AOMPLS-compact-with-fck-full57` per Agent B's D-B-015 LOCKED card
# (Codex round 6 APPROVE 2026-05-07; supersedes the audit20-locked
# card from D-B-014).
#
# AOMPLSRegressor (AOM_v0) with the 17-operator `compact_with_fck` bank
# (9 compact ops + 8 FCK ops). FCK selected on 17/57 datasets (29.8 %)
# in the full-57 run. Strict §3.3 gate fails: median +8.7 % vs
# aom_ridge_curated_best (gate ≤ +5 %), q90 +35.8 % (gate ≤ +25 %),
# worst +136.6 % (gate ≤ +75 %). Paper-CNN scoped claim: median −5.5 %,
# 28/48 wins (58 %, below the 75 % science gate). exhaustive_research
# only; do not promote.

canonical_name: AOMPLS-compact-with-fck-full57
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aompls.estimators.AOMPLSRegressor
        params:
          operator_bank: compact_with_fck
          n_components: auto
          max_components: 15
          selection: global
          criterion: cv
          cv: 5
          backend: numpy
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 1200
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOM-PLS-compact-numpy
    - AOMRidge-global-compact-none
    - AOMPLS-compact-with-fck-full57
