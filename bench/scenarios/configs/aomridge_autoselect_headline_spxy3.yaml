# bench/scenarios/configs/aomridge_autoselect_headline_spxy3.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `AOMRidge-AutoSelect-headline-spxy3`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# AOMRidge-AutoSelector candidate stack with outer SPXYFold(3).
# Same maturity gating as the Blender variant (D-A-001 multi-seed rerun
# required before promotion out of `exploratory`).

canonical_name: AOMRidge-AutoSelect-headline-spxy3
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aomridge.auto_selector.AOMRidgeAutoSelector
        params:
          candidates: null
          outer_cv: 3
          outer_cv_kind: spxy
          outer_cv_repeats: 1
          scoring: rmse_mean
          n_jobs: 1
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 3600
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOMRidge-global-compact-none
    - AOMRidge-AutoSelect-headline-spxy3
