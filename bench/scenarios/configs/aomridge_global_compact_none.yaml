# bench/scenarios/configs/aomridge_global_compact_none.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `AOMRidge-global-compact-none`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Mirrors AOMRidge benchmarks `selection="superblock"` + branches=("none",)
# pattern. branches `("none",)` collapses the multi-branch search to a single
# raw-feature branch — that is the "none" suffix in the canonical name.

canonical_name: AOMRidge-global-compact-none
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aomridge.estimators.AOMRidgeRegressor
        params:
          selection: superblock
          operator_bank: compact
          branches: ['none']
          alphas: auto
          alpha_grid_size: 50
          x_scale: center
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 1200
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOMRidge-global-compact-none
