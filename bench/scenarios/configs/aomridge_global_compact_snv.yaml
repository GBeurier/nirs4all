# bench/scenarios/configs/aomridge_global_compact_snv.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `AOMRidge-global-compact-snv`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Same as `aomridge_global_compact_none.yaml` but with branches=("snv",) —
# the SNV variant of the AOM-Ridge global / superblock selection.

canonical_name: AOMRidge-global-compact-snv
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: aomridge.estimators.AOMRidgeRegressor
        params:
          selection: superblock
          operator_bank: compact
          branches: ['snv']
          alphas: auto
          alpha_grid_size: 50
          x_scale: center
          random_state: 0

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 1200
  pythonpath_prepend:
    - bench/AOM_v0/Ridge
    - bench/AOM_v0

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOMRidge-global-compact-none
    - AOMRidge-global-compact-snv
