# bench/scenarios/configs/aomridge_local_compact_knn_sweep.yaml
#
# Owner: Agent C / MLOps Spine. Companion to registry entry
# `AOMRidge-Local-compact-knn-sweep` per Codex round-12 §3 (D-A-009 LOCK
# 2026-05-08 17:10 CEST).
#
# Status: DECISION_LOCKED via Codex round 12.
#
# Mirrors A's `bench/AOM_v0/Ridge/scenarios/configs/aomridge_local_compact_kgrid_sweep.yaml`
# (D-A-009 launch YAML). The only divergence is the `canonical_name` field:
# A's YAML reuses `AOMRidge-Local-compact-knn50` (the D-A-003 baseline slot)
# for registry-validation parity in their da009_local_knn_sweep.json manifest;
# this YAML declares the formal Codex-R12-§3 canonical_name
# `AOMRidge-Local-compact-knn-sweep` so the harness's preset path can
# dispatch the variant by its proper name.
#
# Both YAMLs share the same model class (`aomridge.local_ridge.AOMLocalRidge`)
# and the same param dict — the divergence is purely at the canonical_name
# layer.

canonical_name: AOMRidge-Local-compact-knn-sweep
schema_version: 0.1.0
codex_review_status: DECISION_LOCKED

model:
  pipeline:
    - model:
        class: aomridge.local_ridge.AOMLocalRidge
        params:
          operator_bank: compact
          k_grid: [10, 25, 50, 100, 200]   # D-A-009 k-tuning sweep — internal best-k selection per fit
          distance_branches: ['none', 'snv', 'msc']
          alpha_grid_size: 15
          cv: 3
          local_weight_beta: auto
          block_scaling: none
          center: true
          random_state: 0

hyperparameter_search:
  protocol: model_native           # AOMLocalRidge runs its own inner CV per knn batch
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 7200                  # widened from 1800s — 5x internal k_grid loop pushes per-fit wall up
  pythonpath_prepend:
    - bench/AOM_v0/Ridge           # provides aomridge.*
    - bench/AOM_v0                 # provides aompls.* (aomridge runtime dependency)

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - AOMRidge-Local-compact-knn50  # D-A-003 fixed-k baseline
    - AOMRidge-Local-compact-knn-sweep  # this file (D-A-009 sweep)
    - ASLS-AOM-compact-cv5-numpy
