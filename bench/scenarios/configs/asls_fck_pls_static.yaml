# bench/scenarios/configs/asls_fck_pls_static.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `ASLS-FCK-PLS-static`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Pipeline = SNV (placeholder for "ASLS"-style baseline correction) →
# FCKStaticTransformer → PLSRegression. exhaustive_research only.
# Codex round 3 §4 caveat: this variant only appears in fast12 (n=8 wins
# vs AOM-Ridge), so the audit20 / full-57 picture is missing. Kept for
# ensemble diversity and as a placeholder until B ships a proper ASLS
# preprocessor — at that point the SNV step here should be replaced.

canonical_name: ASLS-FCK-PLS-static
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - {class: nirs4all.operators.transforms.scalers.StandardNormalVariate, params: {}}
    - {class: nirs4all.operators.transforms.fck_static.FCKStaticTransformer, params: {}}
    - {class: sklearn.preprocessing.StandardScaler, params: {}}
    - model:
        class: sklearn.cross_decomposition.PLSRegression
        params:
          n_components: 10
          scale: false
          max_iter: 500

hyperparameter_search:
  protocol: kfold
  n_splits: 5
  shuffle: true
  random_state_offset: 0
  param_grid:
    n_components: [5, 10, 15, 20]
  scoring: neg_root_mean_squared_error
  refit: true

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 1200

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - FCK-PLS-static
    - ASLS-FCK-PLS-static
