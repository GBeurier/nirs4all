# bench/scenarios/configs/pls_tuned_cv5.yaml
#
# Owner: Agent C / MLOps Spine. Reference config_template demonstrating the
# contract for `bench/harness/run_benchmark.py::ModelDispatcher`.
# Bound to registry entry `PLS-tuned-cv5` (canonical_name).
#
# Status: SKELETON, DECISION_PENDING_CODEX_REVIEW (sub-decision under D-C-006
# harness contract). The dispatcher does not yet read this file — it loads
# raise_on_missing=False until production hardening lands.
#
# Schema (proposed, see bench/SYNC.md D-C-006 entry):
#   canonical_name:        str — must match the registry entry that points here.
#   model:                 dict — pipeline definition consumed by nirs4all.run().
#     pipeline:            list — sequence of pipeline steps. Items are either
#                          {class: <full.import.path>, params: {...}} or one of
#                          the nirs4all special keywords (model, y_processing,
#                          etc.) per nirs4all/CLAUDE.md "Pipeline Syntax".
#     final_model:         dict — wraps the model step in the standard
#                          {model: {class: ..., params: ...}} form.
#   dispatch:              dict — harness-specific knobs.
#     n_jobs:              int — passed to nirs4all PipelineRunner.
#     verbose:             int — 0/1/2 per nirs4all conventions.
#     timeout_s:           int | null — wall-clock cap per (dataset, seed).
#   evidence_anchors:      dict — names of anchors used by the score-card.
#                          Lower-is-better metric only; null disables ranking.
#
# Codex must validate:
#   a) the field names/types above,
#   b) whether `model.pipeline` should be a flat list or a nested
#      {steps: [...], hyperparameters: {...}} dict,
#   c) the inner-CV protocol — fixed at sklearn KFold(5) for now; AOM-PLS
#      configs may want SPXYFold or RepeatedSPXYFold instead (see
#      bench/scenarios/configs/asls_aom_compact_cv5.yaml when written).

canonical_name: PLS-tuned-cv5
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - {class: sklearn.preprocessing.StandardScaler, params: {}}
    - model:
        class: sklearn.cross_decomposition.PLSRegression
        params:
          # n_components selected by inner-CV grid search (see hyperparameter
          # search block below). Default value here is the median of the
          # AOM_v0 master-CSV PLS-standard rows, used as a fallback if the
          # search is disabled.
          n_components: 10
          scale: false
          max_iter: 500

hyperparameter_search:
  # Inner-CV grid search executed via sklearn GridSearchCV. The harness wires
  # this into nirs4all.run() through {model: <step>, "_grid_": <params>}.
  protocol: kfold
  n_splits: 5
  shuffle: true
  random_state_offset: 0   # added to the outer seed to keep nesting clean
  param_grid:
    n_components: [3, 5, 7, 10, 12, 15, 20]
  scoring: neg_root_mean_squared_error
  refit: true

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 600           # fast tier: 10-minute wall-clock cap per fit

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5         # self-reference; ratio always 1.0 — used as
                            # sanity column in the score-card
    - Ridge-tuned-cv5
