# bench/scenarios/configs/ridge_tuned_cv5.yaml
#
# Owner: Agent C / MLOps Spine. Companion to pls_tuned_cv5.yaml; bound to
# registry entry `Ridge-tuned-cv5`. Demonstrates the schema instantiated
# for sklearn Ridge on raw + StandardScaled spectra.
#
# Status: SKELETON, sub-decision under D-C-010 (config_template schema).
# DECISION_PENDING_CODEX_REVIEW.

canonical_name: Ridge-tuned-cv5
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - {class: sklearn.preprocessing.StandardScaler, params: {}}
    - model:
        class: sklearn.linear_model.Ridge
        params:
          alpha: 1.0
          solver: auto
          max_iter: 1000
          random_state: 0

hyperparameter_search:
  protocol: kfold
  n_splits: 5
  shuffle: true
  random_state_offset: 0
  param_grid:
    alpha: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0, 1000.0]
  scoring: neg_root_mean_squared_error
  refit: true

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 300                # fast tier; Ridge is faster than PLS on dense spectra

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5             # self-reference; ratio always 1.0 in score-card
