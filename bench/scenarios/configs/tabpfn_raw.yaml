# bench/scenarios/configs/tabpfn_raw.yaml
#
# Owner: Agent C / MLOps Spine. Bound to registry entry `TabPFN-Raw`.
# Status: SKELETON, sub-decision under D-C-010. DECISION_PENDING_CODEX_REVIEW.
#
# Raw TabPFN inference: no preprocessing, no HPO. Hard gate from registry
# `input_constraints: {min_n: 10, max_n: 5000, max_features: 1000}`. The
# harness skips datasets that violate the constraint at dispatch time
# (currently NOT enforced — ticket D-C-006e to add input-constraint gating
# in dispatch).

canonical_name: TabPFN-Raw
schema_version: 0.1.0
codex_review_status: DECISION_PENDING_CODEX_REVIEW

model:
  pipeline:
    - model:
        class: tabpfn.TabPFNRegressor
        params:
          n_estimators: 4         # default 4 ensembling
          softmax_temperature: 0.9
          random_state: 0
          device: cuda            # user directive 2026-05-05 19:40 CEST: NNs must run on GPU; RTX 4090 host
          ignore_pretraining_limits: false   # raise if (n,p) exceeds TabPFN's pretrain envelope

hyperparameter_search:
  protocol: model_native
  n_splits: null
  param_grid: null

dispatch:
  n_jobs: 1
  verbose: 0
  timeout_s: 1800        # medium tier; per-fit can spike on large n

evidence_anchors:
  primary_score: rmsep
  primary_score_lower_is_better: true
  reference_models:
    - PLS-tuned-cv5
    - Ridge-tuned-cv5
    - TabPFN-Raw
