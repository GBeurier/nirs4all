# bench/scenarios/model_registry.yaml
#
# Owner: Agent C / MLOps Spine. Single edit point for the registry.
# Status: SKELETON proposal — DECISION_PENDING_CODEX_REVIEW.
# See bench/SYNC.md entry "2026-05-05 — Agent C-bootstrap — C1/C2/C3 skeletons".
#
# Each entry describes one canonical model usable inside scenario presets.
# It is the only object the harness and exporter need to identify a model.
# The registry never duplicates training code; the `module` and
# `config_template` fields point at real Python and YAML.
#
# Schema (fields)
# ---------------
# canonical_name:        stable identifier; never change after publication.
# aliases:               list of label strings observed in the master CSV
#                        (`model_name`, `variant`, normalised forms).
# model_class:           Python class name actually instantiated.
# module:                Python import path of `model_class`.
# config_template:       relative path of the YAML config consumed by the
#                        harness when this model is dispatched. Path may
#                        not exist yet for SKELETON entries; the harness
#                        treats it as a placeholder until populated.
# task_types:            subset of {regression, classification}.
# input_constraints:     dict of gate values used by the exporter to
#                        decide whether a model can run on a dataset.
#                        Allowed keys: min_n, max_n, min_features,
#                        max_features. Any key may be omitted.
# supports_predefined_test_split: bool. If false, only k-fold cohorts are
#                        allowed to dispatch this model.
# inner_cv_nested:       bool. If false, harness MUST emit a warning and
#                        the exporter excludes the entry from
#                        `strong_practical` / `best_current`.
# runtime_tier:          one of {fast, medium, slow, very_slow}.
#                          fast        seconds .. ~1 min per (dataset, seed)
#                          medium      few minutes
#                          slow        ~30 min .. ~2 h
#                          very_slow   multi-hour / overnight
# maturity:              one of {locked, exploratory, legacy, oracle,
#                        local_not_master}. MUST match the dominant tag of
#                        the model's rows in `bench/benchmark_master_results.csv`.
# notes:                 short free-text comment with caveats / coverage /
#                        gates / Codex IDs.
# not_runnable_in_production: optional bool, default false. When true, the
#                        entry exists only to surface paper-baseline /
#                        archival evidence in scenario manifests; the
#                        harness MUST refuse to dispatch it (the exporter
#                        also flags such candidates so consumers can skip
#                        them in run-time loops). Used for paper-only
#                        reference rows (CNN, CatBoost) that have RMSEP
#                        evidence in `paper_master_pivot` but no
#                        runnable Python implementation in the repo.
#
# DECISION_PENDING_CODEX_REVIEW (D-C-004)
#   Codex must validate:
#     a) the schema above (field names, types, allowed values),
#     b) the runtime_tier ladder cutoffs,
#     c) which entries belong in `strong_practical` vs `best_current`
#        before nested-audit verdicts (D-A-001 / D-A-002).

