# Experimental source-aware repetitions: full cartesian feature-level combinations.
name: heterogeneous_repetitions_cartesian_full
task_type: regression
experimental_relation_pipeline: true

sources:
  - name: MIR
    train_x: sample_data/heterogeneous/MIR_train.csv
    test_x: sample_data/heterogeneous/MIR_test.csv
    link_by: sample_id
  - name: RAMAN
    train_x: sample_data/heterogeneous/RAMAN_train.csv
    test_x: sample_data/heterogeneous/RAMAN_test.csv
    link_by: sample_id
  - name: NIRS
    train_x: sample_data/heterogeneous/NIRS_train.csv
    test_x: sample_data/heterogeneous/NIRS_test.csv
    link_by: sample_id

shared_targets:
  path: sample_data/heterogeneous/Y.csv
  link_by: sample_id

repetition_spec:
  sample_id: sample_id
  link_by: sample_id
  target_level: physical_sample
  rep_order: exchangeable
  strict_cardinality: true
  sources:
    MIR: {rep_col: rep, expected: 2}
    RAMAN: {rep_col: rep, expected: 3}
    NIRS: {rep_col: rep, expected: 2}

representations:
  - name: cartesian_full
    stage: raw_before_preprocessing
    unit_level: combo
    combo_selection: deterministic_all
    max_combos_per_sample: 12
    max_total_combos: 12000
    max_total_rows: 12000
    memory_budget: 512MB
    random_state: 0

reducers:
  - role: score
    axis: unit
    input_level: combo
    output_level: sample
    method: mean
  - role: final_output
    axis: unit
    input_level: combo
    output_level: sample
    method: mean

fit_influence:
  mode: auto
  strict_weight_support: false

refit_slots:
  - slot_id: best_cartesian_sample
    mode: refit_one
    selection_level: sample
    selection_metric: rmse
