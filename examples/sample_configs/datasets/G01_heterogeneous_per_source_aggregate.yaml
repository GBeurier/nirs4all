# Experimental source-aware repetitions: pre-aggregate each source to sample level.
# Relation-contract example (experimental_relation_pipeline) - not a legacy DatasetConfigs load.
name: G01_heterogeneous_per_source_aggregate
task_type: regression
experimental_relation_pipeline: true

sources:
  - name: MIR
    train_x: sample_data/heterogeneous/MIR_train.csv
    test_x: sample_data/heterogeneous/MIR_test.csv
    link_by: sample_id
  - name: RAMAN
    train_x: sample_data/heterogeneous/RAMAN_train.csv
    test_x: sample_data/heterogeneous/RAMAN_test.csv
    link_by: sample_id
  - name: NIRS
    train_x: sample_data/heterogeneous/NIRS_train.csv
    test_x: sample_data/heterogeneous/NIRS_test.csv
    link_by: sample_id

shared_targets:
  path: sample_data/heterogeneous/Y.csv
  link_by: sample_id

repetition_spec:
  sample_id: sample_id
  link_by: sample_id
  target_level: physical_sample
  rep_order: exchangeable
  strict_cardinality: true
  missing_repetition_policy: strict
  missing_source_policy: strict
  sources:
    MIR: {rep_col: rep, expected: 2}
    RAMAN: {rep_col: rep, expected: 3}
    NIRS: {rep_col: rep, expected: 2}

representations:
  - name: per_source_aggregate
    stage: raw_before_preprocessing
    unit_level: sample
    method: mean

reducers:
  - role: score
    axis: unit
    input_level: observation
    output_level: sample
    method: mean

fit_influence:
  mode: uniform_rows
